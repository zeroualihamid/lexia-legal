server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 512m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    types {
        application/javascript js mjs;
    }

    # brikz-backend is the browser-facing API for auth, Cross Tower routes, and
    # every qclick-agent route. Keep this list aligned with vite.config.js and
    # brikz-backend/src/proxy/proxy.constants.ts.
    location ~ ^/(api|chat|conversation|domains|cards|parquet|cte-graph|workflow|graph|agents|data|skills|reporting|playground|stream|admin|health|docs|docs-json)(?:/|$) {
        # No URI suffix: nginx must preserve the complete incoming path.
        proxy_pass http://lexia-backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
