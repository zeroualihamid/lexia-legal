server {
    listen 3000;
    listen [::]:3000;
    root /usr/share/nginx/html;
    index index.html;

    # Vite base is /lexia/ — strip prefix and serve from dist root.
    location /lexia/ {
        rewrite ^/lexia/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /lexia/index.html {
        rewrite ^ /index.html break;
    }
}
