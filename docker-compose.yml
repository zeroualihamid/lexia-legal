version: '3.8'

# ============================================================
# Lexia Legal AI Platform — Docker Compose
# ============================================================

services:

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lexia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React/Vite) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexia-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - VITE_API_URL=http://nginx/api
      - VITE_KEYCLOAK_URL=http://keycloak:8080
      - VITE_KEYCLOAK_REALM=legal-ai
      - VITE_KEYCLOAK_CLIENT_ID=legal-ai-frontend
    depends_on:
      - backend
    networks:
      - lexia-network

  # ── Backend (NestJS) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexia-backend
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - .env
    volumes:
      # Claude Code CLI OAuth credentials from the host. Run `claude login`
      # on the host once; the backend container then bills runs against that
      # subscription. Do NOT set ANTHROPIC_API_KEY in .env or the CLI will
      # prefer it over OAuth.
      - ${HOME}/.claude:/root/.claude
      # PDF staging dir for judgment analyses (worker writes here before
      # invoking the CLI, then cleans up).
      - claude_tmp:/tmp/judgments
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL (Application Database) ────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexia-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=legal_ai
      - POSTGRES_USER=legal_ai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_ai -d legal_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL (Keycloak Database) ───────────────────────
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: lexia-postgres-keycloak
    restart: unless-stopped
    volumes:
      - pgdata-keycloak:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Keycloak (Identity & Access Management) ───────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lexia-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge
      - KC_LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Qdrant (Vector Database) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexia-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__LOG_LEVEL=INFO
    expose:
      - "6333"
      - "6334"
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lexia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_BROWSER=on
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis (Queue & Cache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexia-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - lexia-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Bull Board (Queue Dashboard) ─────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: lexia-bull-board
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USE_TLS=false
    ports:
      - "3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lexia-network

# ─── Named Volumes ────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  pgdata-keycloak:
    driver: local
  qdrant_storage:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  claude_tmp:
    driver: local

# ─── Networks ─────────────────────────────────────────────────
networks:
  lexia-network:
    driver: bridge
    name: lexia-network
