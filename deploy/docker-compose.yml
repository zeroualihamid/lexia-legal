name: lexia-legal

networks:
  lexia-internal:
    driver: bridge
    name: lexia-network

services:
  # ── Lexia Legal AI — reverse proxy ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lexia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - lexia-backend
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Lexia Legal AI — React/Vite frontend ─────────────────────
  frontend:
    build:
      context: ../lexia-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: legal-ai
        VITE_KEYCLOAK_CLIENT_ID: legal-ai-frontend
        VITE_BASE: /lexia/
    container_name: lexia-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - lexia-backend
    networks:
      - lexia-internal

  # ── Unified NestJS API (legal platform + better-auth + agent proxy) ──
  lexia-backend:
    build:
      context: ..
      dockerfile: lexia-backend/Dockerfile
    image: lexia-backend:${VERSION:-latest}
    container_name: lexia-legal-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://${POSTGRES_USER:-legal_ai}:${POSTGRES_PASSWORD}@postgres:5432/${LEXIA_BACKEND_DB:-lexia_auth}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:6002}
      LEXIA_CHAT_ORIGIN: ${LEXIA_CHAT_ORIGIN}
      LEXIA_ADMIN_ORIGIN: ${LEXIA_ADMIN_ORIGIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      LEXIA_AGENT_URL: http://lexia-agent:8000
      LEXIA_AGENT_INTERNAL_SECRET: ${LEXIA_AGENT_INTERNAL_SECRET}
      LEXIA_USER_DOCS_COLLECTION: ${LEXIA_USER_DOCS_COLLECTION:-lexia_user_docs}
      LEXIA_DEFAULT_UPLOAD_QUOTA: ${LEXIA_DEFAULT_UPLOAD_QUOTA:-100}
      PROXY_REQUIRE_AUTH: "true"
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      LEXIA_AUDIT_ENABLED: ${LEXIA_AUDIT_ENABLED:-false}
      LEXIA_AUDIT_CRON: ${LEXIA_AUDIT_CRON:-0 */6 * * *}
      LEXIA_AUDIT_AUTO_FIX: ${LEXIA_AUDIT_AUTO_FIX:-false}
      LEXIA_AUDIT_MIN_SEVERITY: ${LEXIA_AUDIT_MIN_SEVERITY:-medium}
      LEXIA_AUDIT_LIMIT: ${LEXIA_AUDIT_LIMIT:-50}
      LEXIA_AUDIT_MAX_EVAL: ${LEXIA_AUDIT_MAX_EVAL:-30}
      LEXIA_AUDIT_MAX_FIXES: ${LEXIA_AUDIT_MAX_FIXES:-3}
      LEXIA_AUDIT_SINCE_SECONDS: ${LEXIA_AUDIT_SINCE_SECONDS:-0}
      LEXIA_AUDIT_RUN_ON_BOOT: ${LEXIA_AUDIT_RUN_ON_BOOT:-false}
    expose:
      - "4000"
    ports:
      - "${LEXIA_BACKEND_PORT:-${BACKEND_PORT:-6002}}:4000"
    volumes:
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      - claude_tmp:/tmp/judgments
    networks:
      - lexia-internal
    depends_on:
      postgres:
        condition: service_healthy
      lexia-agent:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Agent stack — admin UI ───────────────────────────────────
  lexia-admin:
    build:
      context: ../lexia-admin
      dockerfile: Dockerfile.release
      args:
        VITE_API_URL: ""
        VITE_BASE: "/"
    image: lexia-admin:${VERSION:-latest}
    container_name: lexia-legal-admin
    ports:
      - "${LEXIA_ADMIN_PORT:-5175}:80"
    networks:
      - lexia-internal
    depends_on:
      lexia-backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Agent stack — FastAPI agent ──────────────────────────────
  lexia-agent:
    build:
      context: ../lexia-agent
      dockerfile: Dockerfile
    image: lexia-agent:${VERSION:-latest}
    container_name: lexia-legal-agent
    env_file:
      - ../.env
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-lexia}
      MINIO_SECURE: "false"
      MINIO_QVD_PREFIX: ${MINIO_QVD_PREFIX:-qvd/}
      LEXIA_BACKEND_URL: http://lexia-backend:4000
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      LEXIA_AGENT_INTERNAL_SECRET: ${LEXIA_AGENT_INTERNAL_SECRET}
      LEXIA_USER_DOCS_COLLECTION: ${LEXIA_USER_DOCS_COLLECTION:-lexia_user_docs}
      LEXIA_DOC_EMBED_MODEL: ${LEXIA_DOC_EMBED_MODEL:-intfloat/multilingual-e5-large}
      # Persist the FastEmbed ONNX model in the app_data volume so it is
      # downloaded once and survives restarts (default cache is ephemeral /tmp).
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/app/data/fastembed_cache}
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./config/datasources.yaml:/app/config/datasources.yaml
      - ./config/llm_config.yaml:/app/config/llm_config.yaml:ro
      - ../.env:/app/.env
      - app_data:/app/data
      - app_prompts:/app/prompts
      - claude_config:/app/.claude
    expose:
      - "8000"
    networks:
      - lexia-internal
    depends_on:
      minio-bucket:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── PostgreSQL (application) ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexia-legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-legal_ai}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lexia_pg_data:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_ai} -d ${POSTGRES_DB:-legal_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL (Keycloak) ────────────────────────────────────
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: lexia-postgres-keycloak
    restart: unless-stopped
    volumes:
      - lexia_pg_keycloak_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Keycloak ─────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lexia-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    volumes:
      # Mount ONLY the realm export into the import dir. The directory also holds
      # user-profile.json + helper scripts, and --import-realm would otherwise
      # try to parse those as realm representations and crash on boot.
      - ../infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Qdrant ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: lexia-legal-qdrant
    restart: unless-stopped
    volumes:
      - lexia_qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: INFO
    expose:
      - "6333"
      - "6334"
    ports:
      - "${QDRANT_PUBLISH_PORT:-6333}:6333"
      - "6334:6334"
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: lexia-legal-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
      MINIO_BROWSER: "on"
    command: server /data --console-address ":9001"
    volumes:
      - lexia_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio-bucket:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: lexia-legal-minio-bucket
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-lexia}
    entrypoint: /bin/sh
    command: >
      -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
      && mc mb --ignore-existing local/$$MINIO_BUCKET"
    networks:
      - lexia-internal

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexia-legal-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - lexia_redis_data:/data
    expose:
      - "6379"
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    networks:
      - lexia-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Bull Board (legal platform queues) ───────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: lexia-bull-board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_TLS: "false"
    ports:
      - "3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lexia-internal

  # ── pgAdmin (optional DB admin) ──────────────────────────────
  pgadmin-config:
    image: busybox:1.36
    container_name: lexia-legal-pgadmin-config
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-legal_ai}
    volumes:
      - lexia_pgadmin_config:/pgadmin_config
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /pgadmin_config
        cat > /pgadmin_config/servers.json <<EOF
        {
          "Servers": {
            "1": {
              "Name": "lexia-legal Postgres",
              "Group": "lexia-legal",
              "Host": "postgres",
              "Port": 5432,
              "MaintenanceDB": "$$POSTGRES_DB",
              "Username": "$$POSTGRES_USER",
              "PassFile": "/pgadmin_config/pgpass",
              "SSLMode": "prefer"
            }
          }
        }
        EOF
        printf 'postgres:5432:*:%s:%s\n' "$$POSTGRES_USER" "$$POSTGRES_PASSWORD" > /pgadmin_config/pgpass
        chown 5050:5050 /pgadmin_config/servers.json /pgadmin_config/pgpass
        chmod 644 /pgadmin_config/servers.json
        chmod 600 /pgadmin_config/pgpass
    networks:
      - lexia-internal

  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: lexia-legal-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@lexia.ma}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /pgadmin_config/servers.json
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - lexia_pgadmin_data:/var/lib/pgadmin
      - lexia_pgadmin_config:/pgadmin_config:ro
    ports:
      - "${PGADMIN_PORT:-5052}:80"
    networks:
      - lexia-internal
    depends_on:
      postgres:
        condition: service_healthy
      pgadmin-config:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  app_data:
    driver: local
  app_prompts:
    driver: local
  claude_config:
    driver: local
  claude_tmp:
    driver: local
  lexia_minio_data:
    driver: local
  lexia_redis_data:
    driver: local
  lexia_pg_data:
    driver: local
  lexia_pg_keycloak_data:
    driver: local
  lexia_pgadmin_data:
    driver: local
  lexia_pgadmin_config:
    driver: local
  lexia_qdrant_data:
    driver: local
