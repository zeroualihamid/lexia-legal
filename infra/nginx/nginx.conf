# ============================================================
# Lexia Legal AI Platform — Nginx Configuration
# ============================================================

# ─── Upstream Definitions ───────────────────────────────────

upstream backend {
    server backend:4000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ─── Gzip Compression ───────────────────────────────────────

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/html
    text/javascript
    text/xml
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

# ─── Server Block ───────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Maximum upload size (for document uploads)
    client_max_body_size 200m;

    # Connection and timeout settings
    proxy_connect_timeout       60s;
    proxy_http_version          1.1;
    proxy_set_header Connection "";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # ─── SSE / Streaming Chat ─────────────────────────────────
    # Disable buffering for Server-Sent Events (AI streaming)
    location /api/chat/stream {
        proxy_pass          http://backend;
        proxy_buffering     off;
        proxy_cache         off;

        # Keep the connection alive for streaming responses
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        proxy_connect_timeout   60s;

        # SSE-specific headers
        add_header  X-Accel-Buffering  no;
        add_header  Cache-Control      no-cache;
        add_header  Content-Type       text/event-stream;

        chunked_transfer_encoding on;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
    }

    # ─── API Routes ───────────────────────────────────────────
    location /api {
        proxy_pass          http://backend;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        # CORS headers are handled by the backend
    }

    # ─── Health Check ─────────────────────────────────────────
    location /health {
        proxy_pass          http://backend;
        proxy_read_timeout  10s;
        proxy_send_timeout  10s;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        access_log off;
    }

    # ─── Swagger / OpenAPI Docs ───────────────────────────────
    location /docs {
        proxy_pass          http://backend;
        proxy_read_timeout  30s;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # ─── Frontend (SPA) ───────────────────────────────────────
    location / {
        proxy_pass          http://frontend;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        # Support SPA client-side routing
        proxy_intercept_errors  on;
        error_page 404          /;
    }

    # ─── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ─── Logging ──────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;
}
