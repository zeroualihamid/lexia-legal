<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BI Dashboard CSS Template</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f4f7fb;
        --bg-accent: rgba(58, 95, 255, 0.08);
        --surface: rgba(255, 255, 255, 0.76);
        --surface-strong: #ffffff;
        --surface-muted: #eef2f8;
        --text: #132033;
        --muted: #61708a;
        --line: rgba(19, 32, 51, 0.09);
        --line-strong: rgba(19, 32, 51, 0.16);
        --brand: #325cff;
        --brand-soft: rgba(50, 92, 255, 0.1);
        --success: #1f8f5f;
        --warning: #b7791f;
        --danger: #d14343;
        --shadow-lg: 0 24px 60px rgba(37, 54, 88, 0.12);
        --shadow-sm: 0 10px 28px rgba(37, 54, 88, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --sidebar-width: 272px;
        --content-width: 1600px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, var(--bg-accent), transparent 32%),
          linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(19, 32, 51, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(19, 32, 51, 0.025) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(circle at center, black 40%, transparent 88%);
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p {
        margin: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .dashboard-shell {
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        min-height: 100vh;
      }

      .dashboard-sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 28px 20px;
        border-right: 1px solid var(--line);
        background: rgba(249, 251, 255, 0.82);
        backdrop-filter: blur(22px);
      }

      .dashboard-sidebar-section {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.8);
        box-shadow: var(--shadow-sm);
      }

      .dashboard-nav {
        display: grid;
        gap: 10px;
      }

      .dashboard-nav-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
        border: 1px solid transparent;
        border-radius: 14px;
        transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .dashboard-nav-link:hover,
      .dashboard-nav-link.is-active {
        background: var(--surface-strong);
        border-color: rgba(50, 92, 255, 0.16);
        box-shadow: var(--shadow-sm);
      }

      .dashboard-main {
        width: min(100%, var(--content-width));
        padding: 28px;
      }

      .dashboard-stack {
        display: grid;
        gap: 18px;
      }

      .dashboard-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .dashboard-actions,
      .dashboard-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .dashboard-chip,
      .dashboard-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 44px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
      }

      .dashboard-button.is-primary {
        border-color: transparent;
        background: var(--brand);
        color: var(--surface-strong);
        box-shadow: var(--shadow-sm);
      }

      .dashboard-grid {
        display: grid;
        gap: 18px;
      }

      .dashboard-grid.kpi-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .dashboard-grid.two-column-grid {
        grid-template-columns: 1.7fr 1fr;
      }

      .dashboard-grid.split-grid {
        grid-template-columns: 1.1fr 0.9fr;
      }

      .dashboard-panel {
        position: relative;
        overflow: hidden;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        padding: 22px;
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow-lg);
      }

      .dashboard-panel::after {
        content: "";
        position: absolute;
        inset: auto -18% -38% auto;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(50, 92, 255, 0.08), transparent 70%);
        pointer-events: none;
      }

      .dashboard-panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .dashboard-panel-body {
        min-width: 0;
      }

      .dashboard-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--brand-soft);
        color: var(--brand);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
      }

      .dashboard-kpi-value {
        font-size: clamp(2rem, 3vw, 2.6rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .dashboard-delta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 6px 10px;
        border-radius: 999px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
      }

      .dashboard-delta.is-positive {
        background: rgba(31, 143, 95, 0.12);
        color: var(--success);
      }

      .dashboard-delta.is-warning {
        background: rgba(183, 121, 31, 0.12);
        color: var(--warning);
      }

      .dashboard-delta.is-danger {
        background: rgba(209, 67, 67, 0.12);
        color: var(--danger);
      }

      .dashboard-chart-slot,
      .dashboard-table-slot,
      .dashboard-widget-slot {
        min-width: 0;
        min-height: 240px;
        border: 1px dashed var(--line-strong);
        border-radius: calc(var(--radius-xl) - 8px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.46), rgba(238, 242, 248, 0.56));
      }

      .dashboard-chart-slot.is-tall {
        min-height: 320px;
      }

      .dashboard-chart-slot.is-short,
      .dashboard-widget-slot.is-short {
        min-height: 180px;
      }

      .dashboard-list {
        display: grid;
        gap: 12px;
      }

      .dashboard-list-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.56);
      }

      .dashboard-scroll {
        overflow: auto;
      }

      .dashboard-mono {
        font-family: "IBM Plex Mono", monospace;
      }

      @media (max-width: 1180px) {
        .dashboard-shell {
          grid-template-columns: 1fr;
        }

        .dashboard-sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .dashboard-grid.kpi-grid,
        .dashboard-grid.two-column-grid,
        .dashboard-grid.split-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 820px) {
        .dashboard-main {
          padding: 20px;
        }

        .dashboard-topbar {
          flex-direction: column;
        }

        .dashboard-grid.kpi-grid,
        .dashboard-grid.two-column-grid,
        .dashboard-grid.split-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .dashboard-sidebar {
          padding: 18px 16px;
        }

        .dashboard-main {
          padding: 16px;
        }

        .dashboard-panel {
          padding: 18px;
          border-radius: 22px;
        }

        .dashboard-actions,
        .dashboard-filters {
          width: 100%;
        }

        .dashboard-chip,
        .dashboard-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body></body>
</html>
